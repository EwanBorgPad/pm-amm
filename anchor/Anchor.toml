[toolchain]
anchor_version = "1.0.1"
solana_version = "3.0.14"
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
pm_amm = "8V872cTKfH1gC5zBvQhrQN2DXSmRNokPPjPsBE46MZNj"

[programs.localnet]
pm_amm = "Dxf1PDY1sQjy3qEkekiV26rDv3W6GdkQSKx6hLLf13nK"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
ledger = ".anchor/test-ledger"
rpc_port = 8899
# Clone Metaplex Token Metadata Program from devnet so `initialize_market`
# CPI calls don't crash with "Unsupported program id" on a vanilla localnet.
url = "https://api.devnet.solana.com"

[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"
